<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitMaker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Major+Mono+Display&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="topbar">
        <h1 class="brand"><span class="brand__line">Fit</span><span class="brand__line">Maker</span></h1>
        <p class="credit">
          By Anya Sherriuble
          <a href="https://sherriuble.com" target="_blank" rel="noopener noreferrer">sherriuble.com</a>
        </p>
      </header>

      <section class="tabbar" aria-label="Mode selector">
        <button id="tabDaily" class="tabbar__btn active" data-tab="daily" type="button">Daily Look</button>
        <button id="tabTrip" class="tabbar__btn" data-tab="trip" type="button">Travel Helper</button>
      </section>

      <section id="dailyTabPanel" class="tab-panel" data-panel="daily">
        <section class="picker-section" aria-labelledby="weather-label">
          <h2 id="weather-label">Weather</h2>
          <div id="weatherGrid" class="weather-grid"></div>
        </section>

        <section class="picker-section" aria-labelledby="occasion-label">
          <h2 id="occasion-label">Occasion</h2>
          <div id="occasionGrid" class="occasion-grid"></div>
        </section>

        <section class="actions">
          <label class="checkbox">
            <input id="preferLayers" type="checkbox" checked />
            Prefer layered look
          </label>
          <button id="generate" class="primary-btn" type="button">Generate Look</button>
        </section>

        <section id="outfitResult" class="outfit-result" aria-live="polite">
          <h2 class="outfit-result__title">Your fit of the day</h2>
          <div id="result" class="result hidden"></div>
        </section>
      </section>

      <section id="tripTabPanel" class="tab-panel hidden" data-panel="trip">
        <section class="picker-section" aria-labelledby="trip-picker-label">
          <h2 id="trip-picker-label">Trip Look Picker</h2>
          <div id="tripRows" class="trip-rows"></div>
          <div class="trip-actions">
            <button id="addTripRow" class="secondary-btn" type="button">+ Add Row</button>
            <label class="checkbox">
              <input id="encourageRepeats" type="checkbox" />
              Encourage repeats (pack lighter)
            </label>
          </div>
          <button id="generateTrip" class="primary-btn" type="button">Generate Trip Looks</button>
        </section>

        <section id="tripResultSection" class="outfit-result" aria-live="polite">
          <h2 class="outfit-result__title">Trip Looks</h2>
          <div id="tripResult" class="trip-result hidden"></div>
        </section>
      </section>
    </main>

    <script src="/web/app.js"></script>
  </body>
</html>
